name: Stratos Runner Test

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # IMPORTANT: This must match your Helm Release Name
    runs-on: mbb-stratos-db-runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package
        
      - name: Verify Execution
        run: java -cp target/stratos-demo-app-1.0-SNAPSHOT.jar com.maybank.stratos.Main
